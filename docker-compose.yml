# Deployable directly as a Portainer Stack (point it at this repo) or with `docker compose up -d`.
# Set DISCORD_BOT_TOKEN and ANTHROPIC_API_KEY as environment variables in the Portainer stack UI
# (or in a local .env file next to this compose file).
# The version key is required by older compose parsers (e.g. in Portainer); newer ones ignore it.
# "2" is the newest format the libcompose parser in old Portainer versions understands.
version: "2"

services:
  vlabeler-bot:
    build: .
    image: vlabeler-discord-bot
    restart: unless-stopped
    environment:
      # Both required — the bot exits with a clear error at startup if missing
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Optional — leave undefined to use the app's built-in defaults (see .env.example)
      CLAUDE_MODEL: ${CLAUDE_MODEL}
      MAX_TURNS: ${MAX_TURNS}
      MAX_BUDGET_USD_PER_QUERY: ${MAX_BUDGET_USD_PER_QUERY}
      ALLOWED_CHANNEL_IDS: ${ALLOWED_CHANNEL_IDS}
      USER_COOLDOWN_SECONDS: ${USER_COOLDOWN_SECONDS}
      MAX_CONCURRENT_QUERIES: ${MAX_CONCURRENT_QUERIES}
      REPO_SYNC_MINUTES: ${REPO_SYNC_MINUTES}
    volumes:
      - vlabeler-repo:/data

volumes:
  vlabeler-repo:
